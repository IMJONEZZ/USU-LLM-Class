[project]
name = "usu-llm-class"
version = "0.1.0"
description = "Repository for USU LLM Class DSAI-5810/6810"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "numpy>=2.2.1",
    "pandas>=2.2.3",
    "torch>=2.6.0",
    "transformers>=4.48.2",
    "datasets>=3.2.0",
    "scikit-learn>=1.4.0",
    "scipy>=1.14.1",
    "zenml>=0.71.0",
    "ruff>=0.9.3",
    "pytest>=8.3.4",
    "huggingface-hub>=0.27.1",
    "pydantic>=2.8.2",
    "python-dotenv>=1.0.1",
    "tqdm>=4.67.1",
]

[tool.pytest.ini_options]
pythonpath = "."
testpaths = ["tests"]