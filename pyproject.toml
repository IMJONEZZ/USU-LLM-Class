[project]
name = "usu-llm-class"
version = "0.1.0"
description = "Repository for USU LLM Class DSAI-5810/6810"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "zenml[server]>=0.71.0",
    "chromadb>=0.6.3",
    "datasets>=3.2.0",
    "huggingface-hub>=0.27.1",
    "numpy>=2.0.1",
    "peft>=0.14.0",
    "pytest>=7.4.4",
    "sentence-transformers>=3.4.1",
    "torch>=2.6.0",
    "tqdm>=4.67.1",
    "transformers>=4.48.2",
    "typing_extensions>=4.12.2",
    "fastapi>=0.70.0",
    "uvicorn>=0.15.0"
]

[dependency-groups]
dev = [
    "pytest>=8.3.4",
    "ruff>=0.9.3",
]