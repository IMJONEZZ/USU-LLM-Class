[project]
name = "usu-llm-class"
version = "0.1.0"
description = "Repository for USU LLM Class DSAI-5810/6810"
readme = "README.md"
requires-python = ">=3.11,<3.13"
dependencies = [
    "zenml[server]>=0.73.0",
    "torch (>=2.6.0,<3.0.0)",
    "transformers (>=4.48.3,<5.0.0)",
    "torchvision (>=0.21.0,<0.22.0)",
    "datasets (>=3.2.0,<4.0.0)",
    "evaluate (>=0.4.3,<0.5.0)",
    "accelerate (>=1.3.0,<2.0.0)",
    "pytest (>=8.3.4,<9.0.0)",
]

[dependency-groups]
dev = [
    "pytest>=8.3.4",
    "ruff>=0.9.3",
]
