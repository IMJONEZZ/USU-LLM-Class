[project]
name = "usu-llm-class"
version = "0.1.0"
description = "Repository for USU LLM Class DSAI-5810/6810"
readme = "README.md"
requires-python = ">=3.12"

# Main dependencies (packages needed at runtime)
dependencies = [
    "zenml[server]>=0.73.0",
    # Add PyTorch packages that support Python 3.12
    "torch>=2.1.0",
    "torchvision>=0.15.2",
    "torchaudio>=2.1.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.4",
    "ruff>=0.9.3",
]

[tool.pytest.ini_options]
filterwarnings = [
    "ignore::DeprecationWarning"
]