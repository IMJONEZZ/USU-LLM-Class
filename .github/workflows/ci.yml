name: Test, Format, and Lint

on:
  push:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Ensure pip is Installed in `.venv`
        run: |
          uv venv  # Ensure virtual environment is created
          .venv/bin/python -m ensurepip --default-pip  # Force install pip in .venv
          .venv/bin/python -m pip install --upgrade pip setuptools wheel  # Ensure latest pip version

      - name: Install Dependencies
        run: |
          uv sync
          .venv/bin/python -m pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Verify Installed Packages
        run: |
          .venv/bin/python -m pip list
          .venv/bin/python -c "import torch; print('PyTorch installed:', torch.__version__)"

      - name: Run Format and Lint Checks
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run tests
        run: |
          uv run pytest
