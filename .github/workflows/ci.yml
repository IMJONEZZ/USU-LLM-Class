name: Test, Format, and Lint

on:
  push:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Check out your code
      - uses: actions/checkout@v4

      # 2) Install uv
      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      # 3) Set up Python from your .python-version file (assumes 3.12)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      # 4) Create the virtual environment, sync packages, install PyTorch
      - name: Install Dependencies
        run: |
          uv venv
          uv sync
          uv pip install --upgrade pip setuptools wheel
          uv pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

      # 5) Verify that PyTorch is installed
      - name: Verify Installed Packages
        run: |
          uv run python -m pip list
          uv run python -c "import torch; print('PyTorch installed:', torch.__version__)"

      # 6) Set PYTHONPATH and Run lint checks, format checks, tests
      - name: Run Lint, Format, and Tests
        run: |
          # Add project root to PYTHONPATH so 'run.py' is importable
          export PYTHONPATH=$PWD:$PYTHONPATH

          # Run Ruff lint checks
          uv run ruff check .

          # Check if code is properly formatted
          uv run ruff format --check .

          # Run Pytest (now 'tests/test_dataloader.py' can see 'run.py')
          uv run pytest
