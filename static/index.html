<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Ask the Llama!</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 40px auto;
            max-width: 600px;
        }
        h1 {
            margin-bottom: 10px;
        }
        #question {
            width: 100%;
            padding: 8px;
        }
        #askBtn {
            margin-top: 8px;
            padding: 10px 20px;
            cursor: pointer;
        }
        #answer {
            margin-top: 20px;
            padding: 10px;
            background: #efefef;
            min-height: 30px;
        }
    </style>
</head>
<body>
    <h1>Llama 3.2 QA Demo</h1>
    <p>Ask a question:</p>
    <textarea id="question" rows="3" placeholder="Type your question..."></textarea><br />
    <button id="askBtn">Ask</button>

    <div id="answer"></div>

    <script>
      const askBtn = document.getElementById('askBtn');
      const questionInput = document.getElementById('question');
      const answerDiv = document.getElementById('answer');

      askBtn.addEventListener('click', async () => {
        const questionText = questionInput.value.trim();

        if (!questionText) {
          answerDiv.innerText = "Please enter a question!";
          return;
        }
        // Clear the answer area
        answerDiv.innerText = "Thinking...";

        try {
          const response = await fetch("/predict", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ inputs: questionText })
          });

          if (!response.ok) {
            answerDiv.innerText = "Error from server.";
            return;
          }
          const data = await response.json();
          answerDiv.innerText = data.generated_text;
        } catch (err) {
          console.error(err);
          answerDiv.innerText = "Network error or server unreachable.";
        }
      });
    </script>
</body>
</html>
